name: Linux Bundle Smoke Tests

on:
  push:
  pull_request:

jobs:
  ubuntu-bundle-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Build bundled Python executables
        run: |
          chmod +x code_python/build_linux.sh
          code_python/build_linux.sh

      - name: Run bundled executable smoke tests
        run: |
          chmod +x code_python/smoke_test_linux_binaries.sh
          code_python/smoke_test_linux_binaries.sh

      - name: Build Linux release
        run: flutter build linux --release

      - name: Verify executables in release bundle
        run: |
          test -x build/linux/x64/release/bundle/python_executables/filtre
          test -x build/linux/x64/release/bundle/python_executables/excel_generator
          test -x build/linux/x64/release/bundle/python_executables/black_flake_warning
          test -x build/linux/x64/release/bundle/python_executables/autofix
          test -x build/linux/x64/release/bundle/python_executables/delete_results